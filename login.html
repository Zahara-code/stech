<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwtchTech — Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 70%, rgba(212,168,67,0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 20%, rgba(212,168,67,0.05) 0%, transparent 40%);
  }
  .login-card {
    background: #ffffff; border-radius: 20px;
    padding: 48px 42px; width: 100%; max-width: 420px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    position: relative; z-index: 1;
  }
  .logo-area { text-align: center; margin-bottom: 36px; }
  .logo-mark {
    width: 64px; height: 64px; background: #1a1a2e;
    border-radius: 16px; display: inline-flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 900; color: #d4a843;
    margin-bottom: 14px; box-shadow: 0 8px 24px rgba(26,26,46,0.3);
  }
  .brand-name { font-size: 26px; font-weight: 900; color: #1a1a2e; letter-spacing: 2px; }
  .brand-tag { font-size: 11px; color: #d4a843; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
  .divider { height: 1px; background: #e4e8ef; margin: 24px 0; }
  .login-title { font-size: 18px; font-weight: 700; color: #2d3142; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: #9aa0ac; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 700; color: #5a6070; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-wrap { position: relative; }
  .input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9aa0ac; font-size: 14px; }
  input {
    width: 100%; padding: 11px 12px 11px 38px;
    border: 1.5px solid #e4e8ef; border-radius: 10px;
    font-size: 14px; color: #2d3142; background: #f8f9fc;
    transition: border-color 0.15s, background 0.15s;
    font-family: inherit;
  }
  input:focus { outline: none; border-color: #d4a843; background: #fff; }
  .btn-login {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    background: #1a1a2e; color: #ffffff; font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.5px; transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 8px;
  }
  .btn-login:hover { background: #d4a843; color: #1a1a2e; }
  .alert { padding: 12px 14px; border-radius: 10px; margin-bottom: 16px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .alert-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
  .alert-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
  .alert-info { background: #cce5ff; color: #004085; border-left: 4px solid #17a2b8; }
  .default-creds { background: #f8f9fc; border: 1px solid #e4e8ef; border-radius: 8px; padding: 12px; margin-top: 20px; font-size: 12px; color: #5a6070; }
  .default-creds strong { color: #1a1a2e; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo-area">
    <div class="logo-mark">S</div>
    <div class="brand-name">SWTCH TECH</div>
    <div class="brand-tag">Master Your Digital Universe</div>
  </div>
  <div class="divider"></div>
  <div class="login-title">Welcome Back</div>
  <div class="login-sub">Sign in to access the management system</div>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="alert alert-{{ 'error' if cat == 'error' else cat }}">
    <i class="fa fa-exclamation-circle"></i> {{ msg }}
  </div>
  {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <i class="fa fa-user"></i>
        <input type="text" name="username" placeholder="Enter username" required autofocus>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fa fa-lock"></i>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
    </div>
    <button class="btn-login" type="submit">
      <i class="fa fa-sign-in-alt"></i> Sign In
    </button>
  </form>
  <div class="default-creds">
    <strong>Default Credentials:</strong><br>
    Admin: <strong>admin</strong> / <strong>admin123</strong><br>
    Sales: <strong>sales1</strong> / <strong>sales123</strong>
  </div>
</div>
</body>
</html>
